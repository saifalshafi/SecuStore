{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SecuStore{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg: #f0f4f9;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #e2e8f0;
      --text: #1e293b;
      --text2: #64748b;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --primary-glow: rgba(59,130,246,.18);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --nav-bg: #1e3a5f;
      --nav-text: #e0eaff;
      --card-shadow: 0 4px 24px rgba(30,58,95,.08);
      --radius: 14px;
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #162033;
      --border: #334155;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --primary: #60a5fa;
      --primary-dark: #3b82f6;
      --primary-glow: rgba(96,165,250,.2);
      --nav-bg: #0f172a;
      --nav-text: #cbd5e1;
      --card-shadow: 0 4px 24px rgba(0,0,0,.35);
    }

    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { color: var(--primary-dark); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      transition: box-shadow var(--transition), transform var(--transition), background var(--transition);
    }
    .card:hover { box-shadow: 0 8px 32px rgba(30,58,95,.13); }
    .card-header { background: var(--surface2); border-bottom: 1px solid var(--border); }

    /* ── Buttons ── */
    .btn { border-radius: 10px; font-weight: 500; transition: all var(--transition); }
    .btn-primary { background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 16px var(--primary-glow); }
    .btn-success:hover, .btn-danger:hover { transform: translateY(-1px); }

    /* ── Form Controls ── */
    .form-control, .form-select {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .form-control:focus, .form-select:focus {
      background: var(--surface);
      border-color: var(--primary);
      color: var(--text);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .form-label { font-weight: 500; color: var(--text2); font-size: .875rem; margin-bottom: .4rem; }

    /* ── Tables ── */
    .table { color: var(--text); }
    .table > :not(caption) > * > * { background: transparent; border-bottom-color: var(--border); }
    .table-hover tbody tr:hover > * { background: var(--surface2); }

    /* ── Toast Container ── */
    #toastContainer {
      position: fixed; top: 80px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
    }
    .sec-toast {
      min-width: 300px; padding: 14px 18px;
      border-radius: 12px; background: var(--surface);
      border-left: 4px solid var(--primary);
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      display: flex; align-items: center; gap: 12px;
      animation: toastIn .35s cubic-bezier(.4,0,.2,1) forwards;
      color: var(--text);
    }
    .sec-toast.success { border-left-color: var(--success); }
    .sec-toast.error   { border-left-color: var(--danger);  }
    .sec-toast.warning { border-left-color: var(--warning);  }
    .sec-toast .t-icon { font-size: 1.3rem; flex-shrink: 0; }
    .sec-toast .t-close { margin-left: auto; cursor: pointer; opacity: .5; font-size: 1.1rem; }
    .sec-toast .t-close:hover { opacity: 1; }
    @keyframes toastIn  { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity:1; transform: translateX(0);    } to { opacity:0; transform: translateX(40px); } }

    /* ── Full-page Loading Overlay ── */
    #loadingOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,.6); backdrop-filter: blur(4px);
      z-index: 10000; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    #loadingOverlay.show { display: flex; }
    .spinner-ring {
      width: 56px; height: 56px;
      border: 5px solid rgba(255,255,255,.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    #loadingOverlay p { color: #fff; font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stat Cards ── */
    .stat-card {
      border-radius: var(--radius); padding: 22px 26px;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--card-shadow); transition: transform var(--transition);
    }
    .stat-card:hover { transform: translateY(-3px); }
    .stat-card .val { font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .stat-card .lbl { font-size: .8rem; color: var(--text2); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .icon { font-size: 2rem; opacity: .18; }

    /* ── Badge ── */
    .badge { border-radius: 6px; font-weight: 500; }

    /* ── Misc ── */
    .page-title { font-size: 1.7rem; font-weight: 700; color: var(--text); }
    .section-label { font-size: .75rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text2); }
    code { background: var(--surface2); border-radius: 5px; padding: 1px 6px; font-size: .82em; color: var(--primary); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Dark-mode safety overrides ─────────────────────────────────────
       Some templates use Bootstrap utility classes (text-dark, text-muted, etc.)
       or have hardcoded near-black colors that disappear on dark backgrounds.
       These rules keep them readable in both themes. */
    [data-theme="dark"] .text-dark,
    [data-theme="dark"] .text-black,
    [data-theme="dark"] h1, [data-theme="dark"] h2, [data-theme="dark"] h3,
    [data-theme="dark"] h4, [data-theme="dark"] h5, [data-theme="dark"] h6 {
      color: var(--text) !important;
    }
    [data-theme="dark"] .text-muted    { color: var(--text2) !important; }
    [data-theme="dark"] .text-body     { color: var(--text)  !important; }
    [data-theme="dark"] p, [data-theme="dark"] label, [data-theme="dark"] li,
    [data-theme="dark"] span:not([class*="badge"]):not([class*="text-"]) {
      color: inherit;
    }
    [data-theme="dark"] .card-header,
    [data-theme="dark"] .card-body,
    [data-theme="dark"] .card-footer { color: var(--text); }

    /* Bootstrap modals — make them theme-aware */
    [data-theme="dark"] .modal-content {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
    }
    [data-theme="dark"] .modal-header, [data-theme="dark"] .modal-footer {
      border-color: var(--border);
    }
    [data-theme="dark"] .btn-close { filter: invert(1) grayscale(100%) brightness(180%); }

    /* Bootstrap alerts in dark mode */
    [data-theme="dark"] .alert-success {
      background: rgba(16,185,129,.15); color: #6ee7b7; border-color: rgba(16,185,129,.35);
    }
    [data-theme="dark"] .alert-danger {
      background: rgba(239,68,68,.15); color: #fca5a5; border-color: rgba(239,68,68,.35);
    }
    [data-theme="dark"] .alert-warning {
      background: rgba(245,158,11,.15); color: #fcd34d; border-color: rgba(245,158,11,.35);
    }
    [data-theme="dark"] .alert-info {
      background: rgba(59,130,246,.15); color: #93c5fd; border-color: rgba(59,130,246,.35);
    }

    /* Forms in dark mode — placeholder + checkbox */
    [data-theme="dark"] .form-control::placeholder,
    [data-theme="dark"] .form-select::placeholder { color: var(--text2); opacity: .7; }
    [data-theme="dark"] .form-check-input:not(:checked) {
      background-color: var(--surface2); border-color: var(--border);
    }

    /* List groups and dropdown menus */
    [data-theme="dark"] .list-group-item,
    [data-theme="dark"] .dropdown-menu {
      background: var(--surface); color: var(--text); border-color: var(--border);
    }
    [data-theme="dark"] .dropdown-item { color: var(--text); }
    [data-theme="dark"] .dropdown-item:hover { background: var(--surface2); color: var(--text); }

    /* Theme-aware utility text colors */
    .text-theme  { color: var(--text)  !important; }
    .text-theme2 { color: var(--text2) !important; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

{% include 'parts/navbar.html' %}

<!-- ── Toast Container ── -->
<div id="toastContainer"></div>

<!-- ── Loading Overlay ── -->
<div id="loadingOverlay">
  <div class="spinner-ring"></div>
  <p id="loadingMsg">Processing…</p>
</div>

<!-- ── Django Messages → Toasts ── -->
<!-- Django Messages Toasts -->
{% if messages %}
<script>
  window.__djangoMessages = [
    {% for m in messages %}
    { text: "{{ m|escapejs }}", type: "{% if 'error' in m.tags %}error{% elif 'warning' in m.tags %}warning{% else %}success{% endif %}" }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ];
</script>
{% endif %}

<main class="container-fluid px-4 py-4" style="max-width:1280px; margin:0 auto;">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ═══════════════════════════════════════════
   SecuStore Global JS
═══════════════════════════════════════════ */

/* ── Dark Mode ── */
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.innerHTML = next === 'dark' ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
}

/* ── Toast System ── */
function showToast(text, type='success', duration=4500) {
  const icons = { success:'bi-check-circle-fill', error:'bi-x-circle-fill', warning:'bi-exclamation-triangle-fill', info:'bi-info-circle-fill' };
  const toast = document.createElement('div');
  toast.className = `sec-toast ${type}`;
  toast.innerHTML = `<i class="bi ${icons[type]||icons.info} t-icon"></i><span>${text}</span><i class="bi bi-x t-close"></i>`;
  toast.querySelector('.t-close').onclick = () => removeToast(toast);
  document.getElementById('toastContainer').appendChild(toast);
  setTimeout(() => removeToast(toast), duration);
}
function removeToast(t) {
  t.style.animation = 'toastOut .3s forwards';
  setTimeout(() => t.remove(), 300);
}
window.addEventListener('DOMContentLoaded', () => {
  (window.__djangoMessages||[]).forEach(m => showToast(m.text, m.type));
  const saved = localStorage.getItem('theme') || 'light';
  const btn = document.getElementById('themeBtn');
  if (btn) btn.innerHTML = saved === 'dark' ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
});

/* ── Loading Overlay ── */
function showLoading(msg='Processing…') {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

/* ── Auto-logout warning ── */
{% if user.is_authenticated %}
(function() {
  const WARN = 8*60*1000, OUT = 10*60*1000;
  let wt, lt;
  function reset() {
    clearTimeout(wt); clearTimeout(lt);
    wt = setTimeout(() => {
      if (confirm('⚠️ Your session expires in 2 minutes. Stay logged in?'))
        fetch(location.href).then(reset);
    }, WARN);
    lt = setTimeout(() => { showToast('Session expired — logging out.','warning',2000); setTimeout(()=>{ location.href='/Accounts/logout/'; },2000); }, OUT);
  }
  ['mousemove','keypress','click','scroll'].forEach(e=>document.addEventListener(e,reset,{passive:true}));
  reset();
})();
{% endif %}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
