{% extends "base.html" %}
{% load static %}
{% block title %}Password Updated — SecuStore{% endblock %}

{% block extra_css %}
<style>
  body { overflow-x: hidden; }

  .pc-wrap {
    min-height: calc(100vh - 62px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  .pc-card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.12);
    padding: 40px 36px;
    text-align: center;
    animation: cardIn .4s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="dark"] .pc-card { box-shadow: 0 20px 60px rgba(0,0,0,.45); }
  @keyframes cardIn { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

  .pc-icon {
    width: 72px; height: 72px; border-radius: 50%;
    margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(16,185,129,.15); color: #10b981;
    font-size: 2.2rem;
    animation: popIn .5s cubic-bezier(.4,0,.2,1) .15s backwards;
  }
  @keyframes popIn { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .pc-title {
    font-weight: 700; font-size: 1.4rem;
    color: var(--text); margin-bottom: 8px;
  }
  .pc-sub {
    color: var(--text2); font-size: .92rem;
    margin-bottom: 24px; line-height: 1.5;
  }

  .pc-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    color: #fff; padding: 12px 28px;
    border-radius: 12px; font-weight: 600;
    text-decoration: none; font-size: .95rem;
    transition: all .2s;
  }
  .pc-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(37,99,235,.35);
    color: #fff;
  }
</style>
{% endblock %}

{% block content %}
<div class="pc-wrap">
  <div class="pc-card">
    <div class="pc-icon"><i class="bi bi-check-lg"></i></div>
    <h3 class="pc-title">Password Updated</h3>
    <div class="pc-sub">
      Your password has been changed successfully.<br>
      A confirmation email has been sent.
    </div>

    <a class="pc-btn" href="{% url 'intro' %}">
      <i class="bi bi-house-door"></i> Back to Home
    </a>
  </div>
</div>
{% endblock %}
