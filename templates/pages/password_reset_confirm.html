{% extends "base.html" %}
{% block title %}Set New Password — SecuStore{% endblock %}
{% block content %}
<div style="max-width:420px;margin:60px auto;">
  <div class="card p-4 p-md-5">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">🔒</div>
      <h2 style="font-weight:700;">Set New Password</h2>
    </div>
    {% if messages %}{% for m in messages %}<div class="alert alert-{{ m.tags }}">{{ m }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" required minlength="10">
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password_confirm" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
