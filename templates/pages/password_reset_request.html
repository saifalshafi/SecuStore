{% extends "base.html" %}
{% block title %}Reset Password — SecuStore{% endblock %}
{% block content %}
<div style="max-width:420px;margin:60px auto;">
  <div class="card p-4 p-md-5">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">🔑</div>
      <h2 style="font-weight:700;">Reset Password</h2>
      <p style="color:var(--text2);">Enter your email to receive a reset link.</p>
    </div>
    {% if messages %}{% for m in messages %}<div class="alert alert-{{ m.tags }}">{{ m }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
    </form>
    <p class="text-center mt-3"><a href="{% url 'login' %}">← Back to Login</a></p>
  </div>
</div>
{% endblock %}
