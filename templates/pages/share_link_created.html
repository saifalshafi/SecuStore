{% extends "base.html" %}
{% block title %}Link Created — SecuStore{% endblock %}
{% block content %}
<div style="max-width:540px;margin:60px auto;">
  <div class="card p-4 p-md-5">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">✅</div>
      <h2 style="font-weight:700;">Link Created!</h2>
      <p style="color:var(--text2);">One-time use · Expires in <strong>{{ hours }} hours</strong></p>
    </div>
    <div class="mb-4" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;">
      <div style="font-size:.78rem;color:var(--text2);margin-bottom:6px;">Secure Download Link</div>
      <div style="word-break:break-all;font-family:monospace;font-size:.85rem;color:var(--primary);">{{ share_url }}</div>
    </div>
    <button onclick="navigator.clipboard.writeText('{{ share_url }}');this.textContent='✓ Copied!';" class="btn btn-outline-primary w-100 mb-3">
      <i class="bi bi-clipboard me-2"></i>Copy Link
    </button>
    <a href="{% url 'files:file_management' %}" class="btn btn-secondary w-100">← Back to Files</a>
  </div>
</div>
{% endblock %}
